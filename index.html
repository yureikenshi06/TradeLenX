<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradelenx — Futures Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #07090d; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }

    /* Global animations */
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn     { from { opacity:0 } to { opacity:1 } }
    @keyframes slideLeft  { from { opacity:0; transform:translateX(16px) } to { opacity:1; transform:translateX(0) } }
    @keyframes pulse      { 0%,100% { opacity:1 } 50% { opacity:0.55 } }
    @keyframes shimmer    { 0% { background-position:-200% 0 } 100% { background-position:200% 0 } }
    @keyframes scaleIn    { from { opacity:0; transform:scale(0.96) } to { opacity:1; transform:scale(1) } }
    @keyframes driftA     { 0% { transform:translate3d(0,0,0) scale(1) } 50% { transform:translate3d(70px,-40px,0) scale(1.08) } 100% { transform:translate3d(0,0,0) scale(1) } }
    @keyframes driftB     { 0% { transform:translate3d(0,0,0) scale(1) } 50% { transform:translate3d(-90px,50px,0) scale(0.94) } 100% { transform:translate3d(0,0,0) scale(1) } }
    @keyframes driftC     { 0% { transform:translate3d(0,0,0) scale(1) } 50% { transform:translate3d(40px,85px,0) scale(1.05) } 100% { transform:translate3d(0,0,0) scale(1) } }
    @keyframes ambientPan { 0% { transform:translate3d(0,0,0) } 50% { transform:translate3d(-2%,1.5%,0) } 100% { transform:translate3d(0,0,0) } }
    @keyframes floatSoft  { 0% { transform:translateY(0px) } 50% { transform:translateY(-4px) } 100% { transform:translateY(0px) } }

    .page-enter { animation: fadeInUp 0.38s ease both; }
    .card-enter { animation: scaleIn 0.34s cubic-bezier(.22,1,.36,1) both; }
    .ambient-shell { position: relative; isolation: isolate; }
    .ambient-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .ambient-bg::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 15% 20%, rgba(226,184,74,0.16), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(59,130,246,0.14), transparent 22%),
        radial-gradient(circle at 68% 76%, rgba(34,197,94,0.12), transparent 20%),
        radial-gradient(circle at 22% 82%, rgba(139,92,246,0.10), transparent 18%);
      filter: blur(30px);
      animation: ambientPan 24s ease-in-out infinite;
    }
    .ambient-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
      opacity: 0.24;
    }
    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.8;
      mix-blend-mode: screen;
    }
    .orb-a {
      width: 22rem; height: 22rem; left: -5rem; top: 6rem;
      background: radial-gradient(circle at 35% 35%, rgba(226,184,74,0.34), rgba(226,184,74,0.05) 60%, transparent 72%);
      animation: driftA 18s ease-in-out infinite;
    }
    .orb-b {
      width: 26rem; height: 26rem; right: -6rem; top: 10rem;
      background: radial-gradient(circle at 40% 40%, rgba(59,130,246,0.28), rgba(59,130,246,0.04) 58%, transparent 72%);
      animation: driftB 22s ease-in-out infinite;
    }
    .orb-c {
      width: 20rem; height: 20rem; right: 18%; bottom: -4rem;
      background: radial-gradient(circle at 45% 45%, rgba(34,197,94,0.22), rgba(34,197,94,0.04) 56%, transparent 74%);
      animation: driftC 20s ease-in-out infinite;
    }
    .page-ambient {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .page-ambient::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 24%, rgba(226,184,74,0.08), transparent 24%),
        radial-gradient(circle at 84% 22%, rgba(59,130,246,0.08), transparent 20%),
        radial-gradient(circle at 72% 78%, rgba(34,197,94,0.07), transparent 22%);
      animation: ambientPan 18s ease-in-out infinite;
    }
    .page-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(12px);
      opacity: 0.6;
      mix-blend-mode: screen;
    }
    .page-orb-a {
      width: 14rem; height: 14rem; left: 8%; top: 6%;
      background: radial-gradient(circle at 50% 50%, rgba(226,184,74,0.18), transparent 68%);
      animation: driftA 14s ease-in-out infinite;
    }
    .page-orb-b {
      width: 16rem; height: 16rem; right: 10%; top: 22%;
      background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.16), transparent 70%);
      animation: driftB 16s ease-in-out infinite;
    }
    .page-orb-c {
      width: 13rem; height: 13rem; right: 24%; bottom: 10%;
      background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.12), transparent 70%);
      animation: driftC 15s ease-in-out infinite;
    }
    .page-content {
      position: relative;
      z-index: 1;
    }
    .glass-sheen {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.02) 35%, transparent 60%);
      opacity: 0.6;
      pointer-events: none;
    }

    .card-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.24);
    }

    /* Chart bar hover pulse */
    .recharts-bar-rectangle:hover { filter: brightness(1.18); transition: filter 0.12s; }
    /* Recharts area smooth */
    .recharts-area-area { transition: d 0.5s ease; }
    .recharts-responsive-container { animation: fadeIn 0.45s ease both; }

    /* Sidebar nav item hover */
    button:hover { opacity: 0.92; }
    button, input, select, textarea { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease; }
    button:hover { transform: translateY(-1px); }
    [data-float="soft"] { animation: floatSoft 5.5s ease-in-out infinite; }

    /* Loading dot pulse */
    .dot-pulse { animation: pulse 1.2s ease infinite; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1c2333; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #243040; }
    * { scrollbar-width: thin; scrollbar-color: #1c2333 transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
